global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'canary-deploy'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'app-stable'
    static_configs:
      - targets: ['localhost:5001']
    relabel_configs:
      - target_label: deployment
        replacement: 'stable'

  - job_name: 'app-canary'
    static_configs:
      - targets: ['localhost:5002']
    relabel_configs:
      - target_label: deployment
        replacement: 'canary'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']