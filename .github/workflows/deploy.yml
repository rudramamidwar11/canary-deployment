name: Canary Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: canary-deploy-app

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Job 1: Test & Build ───────────────────────────────────────
  build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install and test
        run: |
          cd app
          pip install -r requirements.txt
          export PYTHONPATH=.
          pytest tests/ -v

      - name: Configure AWS (OIDC — no keys stored)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SHA:      ${{ github.sha }}
        run: |
          cd app
          docker build -t $REGISTRY/$ECR_REPOSITORY:$SHA .
          docker tag  $REGISTRY/$ECR_REPOSITORY:$SHA $REGISTRY/$ECR_REPOSITORY:canary
          docker push $REGISTRY/$ECR_REPOSITORY:$SHA
          docker push $REGISTRY/$ECR_REPOSITORY:canary

  # ─── Job 2: Deploy Canary ─────────────────────────────────────
  deploy-canary:
    name: Deploy Canary (10% traffic)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        env:
          INSTANCE: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user bash /home/ec2-user/scripts/deploy-canary.sh"]}' \
            --query 'Command.CommandId' --output text)
          echo "SSM Command: $CMD"
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$INSTANCE"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$INSTANCE" \
            --query 'StandardOutputContent' --output text

  # ─── Job 3: Observe Prometheus (5 min) ───────────────────────
  observe:
    name: Observe Canary Metrics
    runs-on: ubuntu-latest
    needs: deploy-canary
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Watch error rate for 5 minutes
        env:
          EC2_IP: ${{ secrets.EC2_PUBLIC_IP }}
        run: |
          echo "Observing canary for 5 minutes..."
          sleep 60
          FAILS=0
          for i in $(seq 1 8); do
            echo "── Check $i/8 at $(date)"
            RESP=$(curl -sf "http://$EC2_IP:9090/api/v1/query" \
              --data-urlencode 'query=100 * sum(rate(app_requests_total{status_code=~"5..",deployment="canary"}[2m])) / (sum(rate(app_requests_total{deployment="canary"}[2m])) + 0.001)' \
              2>/dev/null || echo '{"data":{"result":[]}}')
            ERR=$(echo $RESP | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          r=d.get('data',{}).get('result',[])
          print(r[0]['value'][1] if r else '0')")
            echo "   Error rate: ${ERR}%"
            BAD=$(python3 -c "print('yes' if float('${ERR}')>5.0 else 'no')")
            [ "$BAD" = "yes" ] && FAILS=$((FAILS+1)) && echo "   ⚠ Exceeds threshold ($FAILS/2)"
            [ "$BAD" = "no"  ] && echo "   ✓ Within threshold"
            [ $FAILS -ge 2 ] && echo "❌ Too many failures — triggering rollback" && exit 1
            sleep 30
          done
          echo "✅ All checks passed!"

  # ─── Job 4a: Promote ──────────────────────────────────────────
  promote:
    name: Promote to Stable
    runs-on: ubuntu-latest
    needs: observe
    if: success()
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - env:
          INSTANCE: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user bash /home/ec2-user/scripts/promote.sh"]}' \
            --query 'Command.CommandId' --output text)
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$INSTANCE"
          echo "✅ Promoted to stable!"

  # ─── Job 4b: Rollback ─────────────────────────────────────────
  rollback:
    name: Rollback Canary
    runs-on: ubuntu-latest
    needs: observe
    if: failure()
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - env:
          INSTANCE: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          CMD=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user bash /home/ec2-user/scripts/rollback.sh"]}' \
            --query 'Command.CommandId' --output text)
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$INSTANCE"
          echo "✅ Rolled back to stable!"
          exit 1